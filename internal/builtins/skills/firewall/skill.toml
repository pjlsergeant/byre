# Built-in skill: firewall — default-deny egress.
#
# Decisions: docs/adr/0010-0012 (enforcement, launch gate, derived egress). The rules are iptables default-DROP on
# OUTPUT with a per-IP allowlist, applied INSIDE the box's network namespace
# but FROM OUTSIDE the box: byre runs firewall.sh via the netns_init mechanism
# (a run-to-completion helper container joining the box's netns as root with
# CAP_NET_ADMIN). The box itself gets no sudo and no capabilities from this
# skill — the agent is subject to the rules and structurally cannot modify
# them (changing netns rules requires CAP_NET_ADMIN, and nothing in the box
# has a path to it).
#
# Launch ordering (fail-closed): the launch-gate file baked below makes the
# box's launcher wait — before first-run hooks and the agent — until
# firewall.sh has applied and verified the rules and signals ready on the
# gate's loopback port. Any failure means the gate never opens and the box
# exits instead of running open. See gen/launcher.sh.
#
# Allowlist: DERIVED — byre unions every enabled skill's [runtime] egress
# declarations (each agent skill carries its own API endpoints; this skill
# carries only the generic base below) and passes the union to the helper as
# BYRE_EGRESS. Entries are host[:port], port defaulting to 443, and each rule
# is scoped to that TCP port, not all-ports to the IP (shared CDN addresses
# front many tenants). Extend per project via the `egress` config key
# (egress = ["host1", "host2:8443"], ADR 0019), same grammar.
# IPs are resolved at apply time — a snapshot; a CDN rotating a domain's IPs
# mid-session makes that host start failing (closed, not open). Restart the
# session to re-resolve.
#
# Known holes, deliberate (documented in the design doc): DNS is allowed
# through (port 53 + Docker's embedded resolver), so DNS tunneling is not
# closed in v1. Disabling the firewall = removing it from `skills` in config.

# apt: iptables (the rules) + netcat-openbsd (the launch-gate listener). The
# rest are network DIAGNOSTICS — a firewalled box is exactly where you want to
# SEE the wall: ping/traceroute an allowlisted host (works) vs a blocked one
# (dropped), dig/nslookup to check name resolution, curl to test an HTTPS
# endpoint. They're plain clients, still subject to the netns rules — they let
# you inspect the boundary, they don't widen it. netcat-openbsd for `nc -l`
# must stay the OpenBSD variant (the gate uses its `-l host port` form).
description = "Default-deny egress firewall; allowlist derived from enabled skills."

[build]
apt = ["iptables", "netcat-openbsd", "iputils-ping", "traceroute", "bind9-dnsutils", "curl", "telnet"]
files = { "firewall.sh" = "/usr/local/bin/byre-firewall", "launch-gate" = "/etc/byre/launch-gate" }
dockerfile = ["RUN chmod +x /usr/local/bin/byre-firewall"]

[runtime]
network_posture = "deny-by-default"
netns_init = "/usr/local/bin/byre-firewall"
# OFFERED, not open (ADR 0020): the firewall itself needs NO egress to
# function, so it opens nothing. These are the doors a dev box commonly
# wants — git hosting and apt — declared here so the config UI can offer
# each as a one-press switch (`byre config` → Egress); opening one writes
# it into YOUR config's `egress`. Debian's apt mirrors default to http
# (port 80), so they're listed with an explicit :80 (and :443 for https
# mirrors). Language registries live in the language templates that imply
# them, offered the same way.
egress_offered = [
  "github.com", "api.github.com", "codeload.github.com",
  "objects.githubusercontent.com", "raw.githubusercontent.com",
  "deb.debian.org:80", "deb.debian.org:443",
  "security.debian.org:80", "security.debian.org:443",
]

[context]
file = "context.md"
