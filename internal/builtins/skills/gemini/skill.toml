# Built-in agent skill: Gemini (Google gemini-cli).
#
# DRAFT — package name @google/gemini-cli VERIFIED against the live npm
# registry 2026-07-07 (bin: gemini). Still host-verify: the --yolo autonomy
# flag and the auth flow (GEMINI_API_KEY env or an OAuth login).
#
# Unlike claude/codex, gemini-cli is an npm package, so this skill brings Node.
# Debian's apt node is too old for gemini-cli, so it installs Node 22 via
# NodeSource, then `npm install -g` (global, on PATH). Config/credentials live in
# a per-project .gemini state volume. No seed.

# The visible description must carry the DRAFT status above: the picker is the
# point of choice, and a finished-sounding line over an unverified autonomy
# flag and auth flow would be a legibility failure.
description = "The Gemini CLI agent; login persists per project. EXPERIMENTAL: autonomy flag and auth flow not yet live-verified."

[build]
apt = ["curl", "ca-certificates"]
dockerfile = [
  "RUN curl -fsSL https://deb.nodesource.com/setup_22.x | bash - && apt-get install -y --no-install-recommends nodejs && rm -rf /var/lib/apt/lists/*",
  "RUN npm install -g @google/gemini-cli",
  # Clear any install residue from ~/.gemini (the .gemini state-volume mount
  # point) so a fresh volume starts clean; gemini recreates it at runtime/login.
  "RUN rm -rf /home/dev/.gemini",
]

[runtime]
# GEMINI_CLI_TRUST_WORKSPACE: gemini's folder-trust check honors this env as
# its highest-precedence test (source-verified, trust.js checkPathTrust).
# Inside a byre box the check duplicates an enclosure byre already provides --
# the box IS the trust boundary (footgun doctrine; same ratified argument as
# codex's --skip-git-repo-check) -- and untrusted mode silently skips project
# agents/GEMINI.md, which byre relies on for context delivery.
# TERM: docker's -t defaults TERM=xterm, so gemini warns about missing
# 256-color support in any modern terminal; claude's COLORTERM precedent.
env = { GEMINI_CLI_TRUST_WORKSPACE = "true", TERM = "xterm-256color" }
# Stable hostname (CRITICAL for login persistence): gemini 0.49+ stores its
# OAuth credential ENCRYPTED (FileKeychain, gemini-credentials.json) with a
# key derived from hostname+username. Docker's default hostname is the
# container id -- new on every rebuild -- so without this flag the login is
# lost on EVERY rebuild (and can never be shared across boxes, ADR 0017).
# Project run_args come last, so a user can still override the hostname.
run_args = ["--hostname", "byre"]
# Egress gemini needs if a firewall skill is enabled (host[:port], default 443):
# the generative + code-assist APIs and the Google OAuth login endpoints.
egress = ["generativelanguage.googleapis.com", "cloudcode-pa.googleapis.com", "oauth2.googleapis.com", "accounts.google.com"]

[agent]
# Verify the non-interactive/autonomy flag for gemini-cli.
command = "gemini --yolo"
state = ".gemini"
# Gemini reads global guidance from ~/.gemini/GEMINI.md. byre places skill
# [context] here at runtime. HOST-VERIFY the path/filename gemini actually reads.
context_target = "/home/dev/.gemini/GEMINI.md"

# No creds seeding: gemini's login is a rotating OAuth token; copying it invites
# a refresh collision. Log in inside the box (the .gemini state volume persists).

[[volumes]]
name = ".gemini"
role = "state"
target = "/home/dev/.gemini"
