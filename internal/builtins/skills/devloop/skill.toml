# Built-in skill: devloop — byre's reusable development workflow.
#
# Delivers three things to any project box:
#   1. `byre-codereview` — an independent, Codex-backed code-review script
#      (shipped via [build].files, on PATH at /usr/local/bin/byre-codereview).
#   2. The workflow conventions (commit discipline, the review loop, test-before-
#      commit) as agent context, placed where the agent reads its memory.
#   3. A persistent scratch volume at /home/dev/scratch ($BYRE_SCRATCH) — a
#      stash for the agent's working files that survives container restarts
#      and rebuilds, unlike /tmp and the rest of the container fs.
#
# Pairs with the codex skill, which installs the codex binary the script drives:
#
#   skills = ["codex", "devloop"]
#
# codex provides the reviewer; devloop provides the script + conventions. codex
# is NOT launched as the agent — it's the second opinion. Authenticate it once
# per box with `codex login --device-auth` (plain `codex login` starts a
# browser-redirect flow that cannot complete in a no-browser sandbox). A
# project's own CLAUDE.md/AGENTS.md still applies on top of the conventions here.

description = "Dev-workflow conventions plus the byre-codereview loop."

[build]
apt = ["jq"] # codereview.sh parses codex --json output with jq
files = { "codereview.sh" = "/usr/local/bin/byre-codereview", "devloop-firstrun.sh" = "/etc/byre/firstrun.d/devloop", "devloop-lib.sh" = "/usr/local/lib/byre-devloop-lib.sh" }
dockerfile = ["RUN chmod +x /usr/local/bin/byre-codereview"]

[runtime]
# Advertise the scratch volume so the agent and scripts can find it without
# hardcoding the path.
env = { BYRE_SCRATCH = "/home/dev/scratch" }

[context]
file = "context.md"

# The agent's persistent stash. The container fs (including /tmp) is throwaway —
# it dies on every restart and rebuild, which happens constantly when byre
# develops itself (--self-edit restarts to apply config changes). This named
# volume survives those. role=state: persistence is the point; clearing it is a
# conscious data loss, not a cache eviction.
[[volumes]]
name = "scratch"
role = "state"
target = "/home/dev/scratch"
