# Built-in skill: devloop — byre's reusable development workflow.
#
# Delivers three things to any project box:
#   1. `byre-codereview` — an independent code-review script (shipped via
#      [build].files, on PATH at /usr/local/bin/byre-codereview). Codex drives
#      it by default; `--reviewer grok` (or BYRE_REVIEWER=grok) uses grok when
#      that skill is enabled too.
#   2. The workflow conventions (commit discipline, the review loop, test-before-
#      commit) as agent context, placed where the agent reads its memory.
#   3. A persistent scratch volume at /home/dev/scratch ($BYRE_SCRATCH) — a
#      stash for the agent's working files that survives container restarts
#      and rebuilds, unlike /tmp and the rest of the container fs.
#
# Workspace write: devloop maintains `.devloop/` at the WORKSPACE root (the
# diary and review log live there, self-gitignored). It creates the directory
# and forces `.devloop/.gitignore` on every launch; a non-directory node at
# that path (a user file, a planted symlink) is never destroyed — devloop
# warns and stands down for the session instead.
#
# Pairs with a reviewer skill, which installs the binary the script drives:
#
#   skills = ["codex", "devloop"]          # codex reviews (the default)
#   skills = ["codex", "grok", "devloop"]  # both available; --reviewer picks
#
# The reviewer skill provides the reviewer; devloop provides the script +
# conventions. The reviewer is NOT launched as the agent — it's the second
# opinion. Authenticate once per box with the device flow (`codex login
# --device-auth` / `grok login --device-auth`; both CLIs' plain `login` starts
# a browser-redirect flow that cannot complete in a no-browser sandbox). A
# project's own CLAUDE.md/AGENTS.md still applies on top of the conventions
# here.
#
# Review execution policy (encoded in the script's prompt, checked by its
# tripwire): the reviewer may run cheap targeted read-only probes to put
# evidence behind a specific finding, but never builds or the test suite (the
# author owns green), and never anything that mutates the tree — the script
# re-hashes the working tree after each run and warns if it changed. codex
# additionally runs under its own OS-level read-only sandbox; grok cannot
# (its Landlock profiles silently break tool execution inside a container —
# see the script), so it relies on the edit-tool strip + tripwire + the box
# boundary.

description = "Dev-workflow conventions plus the byre-codereview loop."

[build]
apt = ["jq"] # codereview.sh parses codex --json output with jq
files = { "codereview.sh" = "/usr/local/bin/byre-codereview", "devloop-firstrun.sh" = "/etc/byre/firstrun.d/devloop", "devloop-lib.sh" = "/usr/local/lib/byre-devloop-lib.sh" }
dockerfile = ["RUN chmod +x /usr/local/bin/byre-codereview"]

[runtime]
# Advertise the scratch volume so the agent and scripts can find it without
# hardcoding the path.
env = { BYRE_SCRATCH = "/home/dev/scratch" }

[context]
file = "context.md"

# The agent's persistent stash. The container fs (including /tmp) is throwaway —
# it dies on every restart and rebuild, which happens constantly when byre
# develops itself (--self-edit restarts to apply config changes). This named
# volume survives those. role=state: persistence is the point; clearing it is a
# conscious data loss, not a cache eviction.
[[volumes]]
name = "scratch"
role = "state"
target = "/home/dev/scratch"
