# Built-in companion skill: gemini-shared-auth (ADR 0017).
#
# ⚠ GATE PENDING (ADR 0017 / TODO §1): Google's refresh-token rotation
# behavior is the one UNVERIFIED claim in docs/agent-credential-mechanics.md.
# If Google rotates refresh tokens on use (Claude-shaped), two concurrent
# boxes sharing this credential will cascade-logout each other and this skill
# must NOT be relied on. It ships for exactly one purpose right now: running
# that empirical gate — login once, run two boxes concurrently, force a
# refresh, confirm neither session dies. Record the result in ADR 0017.
#
# Mechanism (mirrors codex-shared-auth): Gemini writes its credentials IN
# PLACE (source-verified, oauth2.ts fs.writeFile), so the identity files in
# ~/.gemini become symlinks into the machine-scoped identity volume. Gemini
# has no home-relocation env var, so the seam lives inside the real ~/.gemini.
# trustedFolders.json is deliberately NOT touched — per-project trust already
# lives in the per-project state volume, which is where it belongs. The first
# in-box OAuth login (no-browser paste flow) writes through the dangling
# links straight into the shared volume.

description = "Share one Gemini login across all your projects (GATE PENDING — verify rotation first, see skill.toml)."

[build]
files = { "firstrun.sh" = "/etc/byre/firstrun.d/00-gemini-shared-auth" }

[[volumes]]
name = "gemini-identity"
role = "state"
target = "/home/dev/.byre-identity/gemini"
scope = "machine"
