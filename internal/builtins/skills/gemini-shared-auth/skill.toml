# Built-in companion skill: gemini-shared-auth (ADR 0017).
#
# STATUS 2026-07-07: API-KEY sharing VERIFIED live (stored in one box via
# the symlinked keychain, decrypted in another under the stable hostname)
# and rotation-immune -- a static key has no refresh tokens. The OAuth
# path below remains gate-pending. Accepted residual: fresh projects show
# the auth-method picker once, credential prefilled (selectedAuthType is
# per-project settings.json; seeding it is consciously deferred).
#
# ⚠ GATE PENDING for OAuth (ADR 0017 / TODO §6): Google's refresh-token rotation
# behavior is the one UNVERIFIED claim in docs/agent-credential-mechanics.md.
# If Google rotates refresh tokens on use (Claude-shaped), two concurrent
# boxes sharing this credential will cascade-logout each other and this skill
# must NOT be relied on. It ships for exactly one purpose right now: running
# that empirical gate — login once, run two boxes concurrently, force a
# refresh, confirm neither session dies. Record the result in ADR 0017.
#
# Mechanism (mirrors codex-shared-auth): Gemini writes its credentials IN
# PLACE (source-verified: FileKeychain saveData fs.writeFile, 0.49), so the
# identity files in
# ~/.gemini become symlinks into the machine-scoped identity volume. Gemini
# has no home-relocation env var, so the seam lives inside the real ~/.gemini.
# DEPENDS on the gemini skill's stable --hostname: 0.49 encrypts the
# credential with a hostname+username-derived key, so an unstable hostname
# makes the shared file undecryptable in every other box.
# trustedFolders.json is deliberately NOT touched — per-project trust already
# lives in the per-project state volume, which is where it belongs. The first
# in-box OAuth login (no-browser paste flow) writes through the dangling
# links straight into the shared volume.

description = "Share one Gemini login across all your projects (API-key path verified; OAuth path gate-pending, see skill.toml)."

# Deliberately NO `shared_auth_for` (the ADR 0025 onboarding offer): the OAuth
# path is still gate-pending above, and the offer would enable this for every
# gemini user, not just the gate-runners. Declare it once the gate passes.

[build]
files = { "firstrun.sh" = "/etc/byre/firstrun.d/00-gemini-shared-auth" }

[[volumes]]
name = "gemini-identity"
role = "state"
target = "/home/dev/.byre-identity/gemini"
scope = "machine"
