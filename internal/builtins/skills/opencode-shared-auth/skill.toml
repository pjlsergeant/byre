# Built-in companion skill: opencode-shared-auth (ADR 0017 family).
#
# One OpenCode login shared by every byre box that opts in, the codex way:
# the data-dir auth.json becomes a symlink into the machine-scoped identity
# volume.
#
# STATUS 2026-07-16 — MECHANISM VERIFIED, ROTATION GATE PENDING:
#   * Gate 1 (write pattern) PASSED live: opencode 1.18.2 writes auth.json
#     IN PLACE (FileSystem.writeJson = writeFileString + chmod, no
#     temp+rename — binary-source-verified) and a real `opencode auth login`
#     driven through a symlinked auth.json wrote THROUGH the link — target
#     inode preserved, link intact, target chmod 600. The grok failure mode
#     (rename forks the credential off the link, ADR 0023) does not apply.
#   * Gate 2 (multi-box rotation) PENDING: auth.json is a MULTI-PROVIDER
#     store. API-key entries are static — rotation-immune by construction.
#     OAuth entries rotate per provider policy: Anthropic (Claude Pro/Max)
#     refresh tokens are SINGLE-USE server-side (the documented Claude Code
#     failure mode — docs/AGENT-CREDENTIAL-MECHANICS.md), so two boxes
#     refreshing the same stored pair in one window can cascade-logout.
#     opencode re-reads auth.json at request time (lazy, like codex), which
#     gives the shared-single-inode tolerance — the loser of a race picks up
#     the winner's pair on its next read — but that tolerance is exactly
#     what the gate must confirm: log in once (Pro/Max), run two boxes
#     concurrently past a token expiry, confirm neither dies. Record the
#     result here and in docs/AGENT-CREDENTIAL-MECHANICS.md.
#
# It ships now for two purposes: API-key sharing (safe by construction) and
# running that OAuth gate. Mechanism mirrors codex-shared-auth: the firstrun
# hook asserts the symlink EVERY launch (healing the logout-fork), adopts an
# existing per-project login into the shared volume, and prefers the shared
# credential over a local fork. The opencode skill's own login hook keeps
# its anti-planting symlink removal for any OTHER symlink; links into
# /home/dev/.byre-identity/ are recognized as ours.
#
# Accepted residual (until the gate says otherwise): sharing auth.json
# shares ALL provider credentials in it, not just the one you meant — the
# file is one store, and byre does not split it.
#
# Accepted residual — UPSTREAM torn-read hazard (source-confirmed 2026-07-16,
# opencode 1.18.3): Auth.set/remove are an UNLOCKED read-modify-write, and
# Auth.all swallows any read error to {} (auth/index.ts) — so a read landing
# on a half-written file, then a write, silently destroys EVERY provider's
# entry, not just the one being touched. DEFERRED (Pete, 2026-07-16), not
# worked around: (1) API-key logins (the only shape this skill supports, see
# above) write auth.json ONCE at login, never on a refresh cycle, so the only
# collision window is two boxes running `opencode auth login` in the same
# instant; (2) it's upstream's bug to fix — opencode already ships a correctly
# flock'd read-modify-write for mcp-auth.json (mcp/auth.ts) and just never
# applied it here. Full note: docs/AGENT-CREDENTIAL-MECHANICS.md (OpenCode §2).

description = "Share one OpenCode login across all your projects (write-through-symlink mechanics verified live; multi-box OAuth rotation gate pending, see skill.toml)."

# companion_for is the pairing FACT (ADR 0034): the config UI nests this
# skill under opencode's row so the relationship is visible where it's
# enabled. Deliberately NO `shared_auth_for` (the ADR 0025 onboarding
# offer): the OAuth rotation gate is still pending above, and the offer
# would put a gate-pending mechanism in front of every opencode user at
# onboarding, not just the gate-runners. Once the gate passes, SWAP this
# key for shared_auth_for (they are mutually exclusive) — the gemini
# precedent.
companion_for = "opencode"

[build]
files = { "firstrun.sh" = "/etc/byre/firstrun.d/00-opencode-shared-auth" }

[[volumes]]
name = "opencode-identity"
role = "state"
target = "/home/dev/.byre-identity/opencode"
scope = "machine"
