# Built-in companion skill: opencode-shared-auth (ADR 0017 family).
#
# One OpenCode login shared by every byre box that opts in, the codex way:
# the data-dir auth.json becomes a symlink into the machine-scoped identity
# volume.
#
# STATUS 2026-07-16 — SCOPED TO API-KEY LOGINS ONLY (Pete's ruling):
#   * Write pattern VERIFIED: opencode 1.18.3 writes auth.json IN PLACE
#     (FileSystem.writeJson = writeFileString + chmod, no temp+rename —
#     repo-source-verified; live-verified through a symlink). The grok
#     failure mode (rename forks the credential off the link, ADR 0023)
#     does not apply, so a file-level symlink is mechanically sound.
#   * OAuth entries are OUT OF SCOPE, not gated. auth.json is a
#     MULTI-PROVIDER store; OAuth entries (Anthropic Claude Pro/Max,
#     Copilot, ...) rotate a SINGLE-USE refresh token that concurrent
#     boxes cannot safely share (they race and cascade-logout — the
#     documented Claude-class failure). You're not meant to drive an
#     Anthropic subscription through opencode (use the claude skill); the
#     shared-auth broker rebuild that would make OAuth safe (the grok
#     ADR 0036 shape, on opencode's AuthHook.loader seam) is deliberately
#     NOT built. The firstrun hook WARNS (friendly, never touches the
#     credential) if the shared store holds an OAuth entry.
#   * API-key entries are static — rotation-immune, share cleanly. This is
#     the supported shape.
#
# Mechanism mirrors codex-shared-auth: the firstrun hook asserts the symlink
# EVERY launch (healing the logout-fork), adopts an existing per-project login
# into the shared volume, and prefers the shared credential over a local fork.
# The opencode skill's own login hook keeps its anti-planting symlink removal
# for any OTHER symlink; links into /home/dev/.byre-identity/opencode are
# recognized as ours.
#
# Accepted residual: sharing auth.json shares ALL provider credentials in it,
# not just the one you meant — the file is one store, and byre does not split
# it. (For API keys this is benign; OAuth entries are warned about above.)
#
# Accepted residual — UPSTREAM torn-read hazard (source-confirmed 2026-07-16,
# opencode 1.18.3): Auth.set/remove are an UNLOCKED read-modify-write, and
# Auth.all swallows any read error to {} (auth/index.ts) — so a read landing
# on a half-written file, then a write, silently destroys EVERY provider's
# entry, not just the one being touched. DEFERRED (Pete, 2026-07-16), not
# worked around: (1) API-key logins (the only shape this skill supports, see
# above) write auth.json ONCE at login, never on a refresh cycle, so the only
# collision window is two boxes running `opencode auth login` in the same
# instant; (2) it's upstream's bug to fix — opencode already ships a correctly
# flock'd read-modify-write for mcp-auth.json (mcp/auth.ts) and just never
# applied it here. Full note: docs/AGENT-CREDENTIAL-MECHANICS.md (OpenCode §2).

description = "Share one OpenCode API-key login across all your projects (OAuth logins unsupported — they race across boxes; see skill.toml)."

# shared_auth_for is the vouch (ADR 0025: the onboarding offer) AND implies
# the pairing fact (ADR 0034: config-UI nesting). VOUCHED 2026-07-17 — the
# two-box field gate passed live (TestOpencodeSharedAuthLiveGate on the
# sacrificial VM, opencode 1.18.3): a real `opencode auth login` in box A
# stored an API key THROUGH the shared-auth symlink into the machine-scoped
# identity volume (link intact — no fork), and box B's own opencode listed
# the credential from the shared inode. Scope stays API-key logins only (the
# ruling above); the gate is re-runnable ad hoc, deliberately NOT scheduled
# (it drives a real login — see agent_contract_test.go).
shared_auth_for = "opencode"

[build]
files = { "firstrun.sh" = "/etc/byre/firstrun.d/00-opencode-shared-auth" }

[[volumes]]
name = "opencode-identity"
role = "state"
target = "/home/dev/.byre-identity/opencode"
scope = "machine"
