# Built-in companion skill: grok-shared-auth — RETIRED (ADR 0023).
#
# v1 shared one Grok login across boxes the codex way: $GROK_HOME/auth.json
# symlinked into a machine-scoped identity volume. It FAILED ITS FIELD GATE
# (2026-07-10, twice in one day): grok refreshes its OAuth pair every ~6h by
# spending a SINGLE-USE refresh token and writing the result via temp+rename
# — which replaces the symlink with a private local file. The rotated pair
# never reaches the shared volume, the shared copy's chain dies within hours
# ("ServerRejected", unrecoverable), and v1's every-launch symlink heal then
# clobbered working per-box logins with the corpse. Full mechanics:
# docs/agent-credential-mechanics.md; decision record: docs/adr/0023.
#
# This stub stays so a config naming "grok-shared-auth" still resolves — it
# contributes NOTHING (no hooks, no volumes; boxes fall back to per-box
# logins, which rotate correctly). The grok skill's own login hook now
# removes any symlinked auth.json, healing boxes v1 damaged. The old
# machine volume (byre-machine-u<uid>-grok-identity) is no longer mounted;
# it holds only the dead credential and can be removed by hand.
#
# Two rebuild designs are PARKED, not dead — an auth broker riding grok's
# GROK_AUTH_PROVIDER_COMMAND seam, and a fork-shipping watcher + refresh
# jitter: docs/grok-shared-auth-v2-designs.md. (The env API-key path is
# ruled out: xAI API billing is separate from the subscription and ~50x the
# cost at agent volumes.)

# Deliberately NO `shared_auth_for` (the ADR 0024 onboarding offer): a retired
# skill is never put in front of users. A rebuild declares it only after
# passing its gates (docs/grok-shared-auth-v2-designs.md).

description = "RETIRED — grok's single-use token rotation can't be file-shared (2026-07-10 field failure; ADR 0023). Boxes log in per project; rebuild designs are parked in docs/grok-shared-auth-v2-designs.md."
