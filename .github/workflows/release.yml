name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  # The same gofmt/vet/test gate as CI — one definition, so the release
  # can't tag-and-ship a commit CI would have rejected.
  check:
    uses: ./.github/workflows/ci.yml
  goreleaser:
    needs: check
    runs-on: ubuntu-latest
    steps:
      # SHA-pinned (version noted alongside) — this workflow holds a
      # contents: write token, so mutable @vN tags are the wrong reference.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0 # goreleaser derives the changelog from git history
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
      - uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6.4.0
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Empty until the tap exists — see docs/RELEASING.md.
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
