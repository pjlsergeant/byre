name: Site

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/site.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Don't abort an in-flight production deploy; newer pushes queue instead.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Actions SHA-pinned (version noted alongside), same posture as
      # ci.yml/release.yml; Dependabot keeps the pins fresh.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      # Explicit Go version: hugo v0.164.0 needs go >= 1.26, which is
      # newer than byre's own go.mod -- this job builds the site, not byre.
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26.x"
      # go install verifies the module against the public checksum
      # database -- no third-party action, no hand-pinned tarball hash.
      - name: install hugo
        run: go install github.com/gohugoio/hugo@v0.164.0
      # Demo-cast recording is PARKED (2026-07-18): the BYRE_DEMO_REC harness
      # and the demo shortcode stay in-tree, but no casts are recorded or
      # embedded until the demos look the part -- see TODO.md's Site item.
      # Reviving means restoring the recording toolchain + record step here
      # (git history of this file has the working version) and re-placing the
      # {{< demo >}} shortcodes in site/content.
      - name: build site
        run: hugo --minify -s site
      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: site/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
