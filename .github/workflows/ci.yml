name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_call: # release.yml runs this same gate before publishing

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # Actions are pinned by commit SHA (version noted alongside): tags like
      # @v4 are mutable references, and release.yml runs with contents: write.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "gofmt needed on:" >&2
            echo "$unformatted" >&2
            exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test -race ./...

  # Known-vulnerability scan. The tool version is pinned; the vulnerability
  # database it consults is fetched live. Its own job on the stable
  # toolchain: govulncheck's go floor moves faster than byre's go.mod
  # (v1.6.0 wants go >= 1.25), and it analyzes source, so it doesn't need
  # to run on the toolchain that builds byre.
  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: stable
      - name: govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.6.0 ./...

  # The gated engine suite (BYRE_DOCKER_TESTS=1) against the runner's real
  # Docker. A separate job so the fast unit signal stays fast; release.yml's
  # workflow_call pulls this in too, so a release can't ship without it.
  # Interactive iteration on these tests happens on the sacrificial inttest
  # VM (wip/byre-inttest.yaml); CI is the authoritative gate.
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - name: gated integration tests
        run: BYRE_DOCKER_TESTS=1 go test ./... -run Integration -v -timeout 20m
