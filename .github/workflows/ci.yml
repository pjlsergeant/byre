name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_call: # release.yml runs this same gate before publishing

permissions:
  contents: read

jobs:
  test:
    # Two toolchains: go.mod is the declared minimum; stable is the
    # forward-compat leg — `go install .../byre@latest` builds with the
    # user's CURRENT toolchain, so a break under new Go must not wait for
    # a user to report it. gofmt and vet run on the go.mod leg only: their
    # findings drift across Go releases, so on the stable leg they could
    # turn CI red on a Go release day with no commit at fault — and users
    # never run either, so they prove nothing about forward compatibility.
    strategy:
      fail-fast: false
      matrix:
        include:
          - go-version-file: go.mod
          - go-version: stable
    runs-on: ubuntu-latest
    steps:
      # Actions are pinned by commit SHA (version noted alongside): tags like
      # @v4 are mutable references, and release.yml runs with contents: write.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          # Exactly one of these is set per matrix leg; setup-go ignores
          # the empty one.
          go-version: ${{ matrix.go-version }}
          go-version-file: ${{ matrix.go-version-file }}
      - name: gofmt
        if: ${{ matrix.go-version-file }}
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "gofmt needed on:" >&2
            echo "$unformatted" >&2
            exit 1
          fi
      - name: go vet
        if: ${{ matrix.go-version-file }}
        run: go vet ./...
      # tmux: the TUI test tier (internal/tuitest) drives the built byre
      # binary in a private tmux server. The gate set without tmux FAILS
      # (tuitest.Require) — an install regression must not silently skip
      # the tier. bash-completion feeds the completion demo scenario.
      - name: install tmux + bash-completion
        run: sudo apt-get update && sudo apt-get install -y tmux bash-completion
      # asciinema v3 (the rust CLI; distro packages are the v2 python one)
      # records the site demo casts. Pinned by version AND digest — a release
      # binary fetched over the network is run-in-CI code.
      - name: install asciinema (pinned)
        run: |
          curl -fsSL -o /tmp/asciinema https://github.com/asciinema/asciinema/releases/download/v3.2.1/asciinema-x86_64-unknown-linux-gnu
          echo "1b405bbda565b33c3c4718de67fedc3535580603c0694b1ff3fb04f363430a20  /tmp/asciinema" | sha256sum -c
          sudo install -m 0755 /tmp/asciinema /usr/local/bin/asciinema
      # BYRE_DEMO_REC here is the demo tier's push-time signal: a TUI change
      # that breaks a demo scenario fails THIS run, not the next site deploy.
      - name: go test
        run: BYRE_TUI_TESTS=1 BYRE_DEMO_REC=1 go test -race ./...

  # The engine-free tiers (unit suite + tmux TUI tier) on macOS — the OS
  # most byre hosts actually run, previously covered only by daily use.
  # GitHub's macOS runners can't run Docker, so the engine suite stays on
  # the ubuntu integration job; the clipboard-shim TUI tests fake the
  # LINUX read backend (wl-paste) and skip on darwin, keeping DELIVER.md's
  # macOS-verified pasteboard posture. gofmt/vet are platform-independent
  # and already run above.
  test-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - name: install tmux
        run: brew install tmux
      - name: go test
        run: BYRE_TUI_TESTS=1 go test -race ./...

  # Known-vulnerability scan. The tool version is pinned; the vulnerability
  # database it consults is fetched live. Its own job on the stable
  # toolchain: govulncheck's go floor moves faster than byre's go.mod
  # (v1.6.0 wants go >= 1.25), and it analyzes source, so it doesn't need
  # to run on the toolchain that builds byre.
  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: stable
      - name: govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.6.0 ./...

  # The gated engine suite (BYRE_DOCKER_TESTS=1) against the runner's real
  # Docker. A separate job so the fast unit signal stays fast; release.yml's
  # workflow_call pulls this in too, so a release can't ship without it.
  # Interactive iteration on these tests happens on the sacrificial inttest
  # VM (wip/byre-inttest.yaml); CI is the authoritative gate.
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - name: install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux
      # BYRE_SSH_LOOP_TESTS stays unset here: the runner has no sshd, and
      # those tests edit ~/.ssh — they ride the sacrificial inttest VM.
      - name: gated integration tests
        run: BYRE_DOCKER_TESTS=1 BYRE_TUI_TESTS=1 go test ./... -run Integration -v -timeout 20m
