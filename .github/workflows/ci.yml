name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_call: # release.yml runs this same gate before publishing

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # Actions are pinned by commit SHA (version noted alongside): tags like
      # @v4 are mutable references, and release.yml runs with contents: write.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "gofmt needed on:" >&2
            echo "$unformatted" >&2
            exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test -race ./...
      - name: govulncheck
        # Known-vulnerability scan. The tool version is pinned; the
        # vulnerability database it consults is fetched live.
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.6.0 ./...

  # The gated engine suite (BYRE_DOCKER_TESTS=1) against the runner's real
  # Docker. A separate job so the fast unit signal stays fast; release.yml's
  # workflow_call pulls this in too, so a release can't ship without it.
  # Interactive iteration on these tests happens on the sacrificial inttest
  # VM (wip/byre-inttest.yaml); CI is the authoritative gate.
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
      - name: gated integration tests
        run: BYRE_DOCKER_TESTS=1 go test ./... -run Integration -v -timeout 20m
