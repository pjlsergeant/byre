{{ define "main" }}
<article class="landing">
<img class="landing-logo" src="{{ "logo.png" | relURL }}" alt="The byre logo: a highland cow peeking out of a boxed terminal" width="180" height="173">
{{ .Content }}
</article>
<section class="docs-index">
  <h2>Documentation</h2>
  <ul>
    {{ range (site.GetPage "/docs").Pages.ByWeight }}
    <li><a href="{{ .RelPermalink }}">{{ .Title }}</a>{{ with .Description }} -- {{ . }}{{ end }}</li>
    {{ end }}
  </ul>
</section>
{{ end }}
