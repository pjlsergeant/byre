{{ define "main" }}
<div class="docs-wrap">
  {{ partial "docs-nav.html" . }}
  <article class="doc">
    <h1>{{ .Title }}</h1>
    {{ .Content }}
    <ul>
      {{ range .Pages.ByWeight }}
      <li><a href="{{ .RelPermalink }}">{{ .Title }}</a>{{ with .Description }} -- {{ . }}{{ end }}</li>
      {{ end }}
    </ul>
  </article>
</div>
{{ end }}
