<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .IsHome }}byre -- a comfortable, constrained agent environment{{ else }}{{ .Title }} · byre{{ end }}</title>
  <meta name="description" content="{{ if .Description }}{{ .Description }}{{ else }}byre runs your AI coding agent in a throwaway, project-scoped container. Open source, MIT licensed, local-first.{{ end }}">
  <link rel="icon" type="image/png" href="{{ "favicon.png" | relURL }}">
  <link rel="apple-touch-icon" href="{{ "logo.png" | relURL }}">
  <link rel="stylesheet" href="{{ "css/site.css" | relURL }}">
  {{ if .HasShortcode "demo" }}<link rel="stylesheet" href="{{ "vendor/asciinema-player-3.17.0/asciinema-player.css" | relURL }}">{{ end }}
</head>
<body>
  {{ partial "header.html" . }}
  <main>
    {{ block "main" . }}{{ end }}
  </main>
  {{ partial "footer.html" . }}
  <script src="{{ "js/wordmark.js" | relURL }}" defer></script>
  <script src="{{ "js/search.js" | relURL }}" defer></script>
  {{ if .HasShortcode "demo" }}<script src="{{ "vendor/asciinema-player-3.17.0/asciinema-player.min.js" | relURL }}" defer></script>
  <script src="{{ "js/demo.js" | relURL }}" defer></script>{{ end }}
</body>
</html>
