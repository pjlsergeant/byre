baseURL = "https://getbyre.com/"
locale = "en"
title = "byre"

# Taxonomies and RSS are noise for a small docs site.
disableKinds = ["taxonomy", "term", "rss"]

[params]
github = "https://github.com/pjlsergeant/byre"

[markup.highlight]
# Plain <pre><code> blocks, styled by site.css -- no generated inline
# styles to fight in dark mode.
codeFences = false

[markup.tableOfContents]
# The side-nav expands the current page's MAJOR headers only (h2) --
# h3s (e.g. every cookbook question) would drown the rail.
startLevel = 2
endLevel = 2

# Client-side search: the index is BUILT AT DEPLOY TIME as
# /searchindex.json (layouts/index.searchindex.json); js/search.js
# fetches it lazily from the header box. No service, no uploads.
[outputs]
home = ["HTML", "SearchIndex"]

[outputFormats.SearchIndex]
mediaType = "application/json"
baseName = "searchindex"
isPlainText = true
notAlternative = true
