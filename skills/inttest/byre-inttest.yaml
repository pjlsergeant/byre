# byre-inttest.yaml -- the sacrificial integration-test VM, part of the
# pjlsergeant/inttest skill (the `byre-inttest` wrapper is the consumer).
# The whole VM is this file:
#
#   create:  limactl start --name=byre-inttest skills/inttest/byre-inttest.yaml
#   reset:   limactl stop byre-inttest && limactl delete byre-inttest   (then create again)
#   pause:   limactl stop byre-inttest
#
# It deliberately mounts NOTHING from the host: the box's ssh key reaches a
# machine whose entire contents are a repo sync and a Docker image cache.
# The in-box agent syncs the working tree over ssh and runs the gated
# BYRE_DOCKER_TESTS=1 suite ON the VM (a remote DOCKER_HOST can't work --
# bind mounts resolve engine-side, so the tests must run where the engine is).

minimumLimaVersion: "1.0.0"

images:
  - location: "https://cloud.debian.org/images/cloud/trixie/latest/debian-13-generic-arm64.qcow2"
    arch: "aarch64"
  - location: "https://cloud.debian.org/images/cloud/trixie/latest/debian-13-generic-amd64.qcow2"
    arch: "x86_64"

cpus: 4
memory: "4GiB"
disk: "60GiB"

# No host filesystem in the VM, read-only or otherwise.
mounts: []

ssh:
  # Fixed port so the box-side config never churns. From inside a Docker
  # Desktop container this is reachable as host.docker.internal:60022.
  localPort: 60022
  # Authorize the host's ~/.ssh/*.pub keys -- including the dedicated
  # byre-inttest key. Generate that key BEFORE limactl start.
  loadDotSSHPubKeys: true

containerd:
  system: false
  user: false

provision:
  - mode: system
    script: |
      #!/bin/bash
      set -eux -o pipefail
      export DEBIAN_FRONTEND=noninteractive
      apt-get update
      # podman + crun + uidmap/passt/slirp4netns: the ROOTLESS podman path
      # (keep-id, ADR 0032) is part of the gated suite; BYRE_TEST_ENGINE=podman
      # pins a run to it. aardvark-dns is a netavark Recommends that
      # --no-install-recommends would drop -- without it container DNS is off
      # AND the netns-init helper races v6 address setup, so the firewall v6
      # guard test fails (found live on this template's first re-create,
      # 2026-07-16).
      # tmux: the TUI test tier (BYRE_TUI_TESTS=1) drives byre inside a
      # private tmux server.
      apt-get install -y --no-install-recommends git rsync ca-certificates curl golang-go \
        podman crun uidmap passt slirp4netns aardvark-dns tmux
      command -v docker >/dev/null 2>&1 || curl -fsSL https://get.docker.com | sh
  - mode: user
    script: |
      #!/bin/bash
      set -eux -o pipefail
      sudo usermod -aG docker "$USER"
      # Rootless podman over bare ssh: no user dbus, so buildah RUN steps die
      # on "sd-bus: Interactive authentication required" unless the runtime is
      # crun with cgroupfs (runc insists on a systemd slice rootlessly).
      # Linger keeps the user runtime dir alive between sessions.
      mkdir -p ~/.config/containers
      printf '[engine]\nruntime = "crun"\ncgroup_manager = "cgroupfs"\n' > ~/.config/containers/containers.conf
      sudo loginctl enable-linger "$USER"
