[package]
id = "pjlsergeant/inttest"
version = "1.0.0"
kind = "skill"
package_api = 1
requires_byre = ">=0.4.0"
description = "Run byre's gated integration suite on the sacrificial inttest runner (a Lima VM, or a DinD container where the host can't nest VMs) over ssh."

[build]
apt = ["openssh-client"]
files = { "byre-inttest" = "/usr/local/bin/byre-inttest", "byre-inttest.yaml" = "/etc/byre/inttest/byre-inttest.yaml" }

[runtime]
# The Lima runner's fixed ssh endpoint (the template pins localPort 60022),
# under both engines' spellings of "the host": Docker Desktop's and podman's.
# Same functional endpoint, so both are granted; the wrapper tries them in
# order. The DinD runner's addresses (its bridge IP:22, or the host gateway's
# published 60022) are NOT granted here -- like any BYRE_INTTEST_VM override,
# they need their own egress grant in the box config.
egress = ["host.docker.internal:60022", "host.containers.internal:60022"]
env_docs = { BYRE_INTTEST_USER = "ssh user on the inttest runner; both runners name it after the HOST user (Lima by convention, the DinD build via --build-arg INTTEST_USER=$USER) -- pass it through with env_from_host = { BYRE_INTTEST_USER = \"env:USER\" }" }

[[volumes]]
name = "inttest"
role = "state"
target = "/home/dev/.byre-identity/inttest"
scope = "machine"

[context]
file = "context.md"

