[package]
id = "pjlsergeant/inttest"
version = "1.0.0"
kind = "skill"
package_api = 1
requires_byre = ">=0.4.0"
description = "Run byre's gated integration suite on the sacrificial inttest VM (Lima) over ssh."

[build]
apt = ["openssh-client"]
files = { "byre-inttest" = "/usr/local/bin/byre-inttest", "byre-inttest.yaml" = "/etc/byre/inttest/byre-inttest.yaml" }

[runtime]
# The VM's fixed ssh endpoint (the Lima template pins localPort 60022), under
# both engines' spellings of "the host": Docker Desktop's and podman's. Same
# functional endpoint, so both are granted; the wrapper tries them in order.
# Overriding BYRE_INTTEST_VM to some other address needs its own egress grant.
egress = ["host.docker.internal:60022", "host.containers.internal:60022"]
env_docs = { BYRE_INTTEST_USER = "ssh user on the inttest VM; Lima names it after the HOST user -- pass it through with env_from_host = { BYRE_INTTEST_USER = \"env:USER\" }" }

[[volumes]]
name = "inttest"
role = "state"
target = "/home/dev/.byre-identity/inttest"
scope = "machine"

[context]
file = "context.md"

